  <path d="M727 342 C650 405,565 440,510 475" class="dash"/><path d="M727 342 C820 405,1030 440,1177 485" class="line"/>
  <path d="M952 352 C800 405,580 440,510 475" class="line"/><path d="M952 352 C900 405,790 440,740 465" class="line"/><path d="M952 352 C760 415,390 450,285 485" class="line"/>
  <path d="M740 577 C800 610,900 630,962 557" class="line"/><path d="M835 521 H880" class="line"/><path d="M1045 521 H1090" class="line"/><path d="M1177 332 V485" class="line"/>
  <path d="M727 342 C650 570,540 620,505 665" class="dash"/><path d="M952 352 C900 570,825 625,790 665" class="dash"/>
</svg>
