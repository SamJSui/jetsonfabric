<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 780" role="img" aria-labelledby="title desc">
  <title id="title">JetsonFabric Go Package Dependency Diagram</title>
  <desc id="desc">Current Go import and call direction, including coordinator, planner, stage execution, Stagewire, and runtime bridge.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.pkg{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:13}.root{fill:#ecfeff;stroke:#0891b2;stroke-width:3;rx:15}.policy{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:13}.mechanism{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:13}.shared{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:13}.label{font:700 13px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:11px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}.line{stroke:#334155;stroke-width:1.8;marker-end:url(#arrow);fill:none}.dash{stroke:#64748b;stroke-width:1.8;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}</style></defs>
  <text x="40" y="42" class="title">Go package dependency view</text><text x="40" y="68" class="subtitle">Arrows point from the higher-level caller toward the lower-level package it depends on.</text>

  <rect x="55" y="105" width="200" height="62" class="pkg"/><text x="155" y="132" text-anchor="middle" class="label">cmd/jetsonfabric-node</text><text x="155" y="151" text-anchor="middle" class="small">process entrypoint</text>
  <rect x="365" y="95" width="220" height="82" class="root"/><text x="475" y="124" text-anchor="middle" class="label">internal/node</text><text x="475" y="144" text-anchor="middle" class="small">composition root</text><text x="475" y="160" text-anchor="middle" class="small">lifecycle + runtime supervision</text>
  <rect x="740" y="105" width="180" height="62" class="shared"/><text x="830" y="132" text-anchor="middle" class="label">internal/cluster</text><text x="830" y="151" text-anchor="middle" class="small">shared domain types</text>

  <rect x="55" y="270" width="160" height="62" class="pkg"/><text x="135" y="297" text-anchor="middle" class="label">discovery</text><text x="135" y="316" text-anchor="middle" class="small">find and hydrate peers</text>
  <rect x="250" y="270" width="160" height="62" class="pkg"/><text x="330" y="297" text-anchor="middle" class="label">membership</text><text x="330" y="316" text-anchor="middle" class="small">fresh member store</text>
  <rect x="445" y="270" width="160" height="62" class="pkg"/><text x="525" y="297" text-anchor="middle" class="label">election</text><text x="525" y="316" text-anchor="middle" class="small">leader selection</text>
  <rect x="640" y="260" width="175" height="82" class="pkg"/><text x="727" y="288" text-anchor="middle" class="label">facade</text><text x="727" y="308" text-anchor="middle" class="small">public routes</text><text x="727" y="325" text-anchor="middle" class="small">leader + stage proxying</text>
  <rect x="850" y="250" width="205" height="102" class="policy"/><text x="952" y="278" text-anchor="middle" class="label">coordinator</text><text x="952" y="298" text-anchor="middle" class="small">OpenAI handler</text><text x="952" y="315" text-anchor="middle" class="small">runtime compatibility</text><text x="952" y="332" text-anchor="middle" class="small">planning + Generate call</text>
  <rect x="1090" y="270" width="175" height="62" class="mechanism"/><text x="1177" y="297" text-anchor="middle" class="label">runtimebridge</text><text x="1177" y="316" text-anchor="middle" class="small">local StageProxy</text>

  <rect x="195" y="485" width="180" height="72" class="pkg"/><text x="285" y="513" text-anchor="middle" class="label">modelregistry</text><text x="285" y="533" text-anchor="middle" class="small">model metadata</text>
  <rect x="420" y="475" width="180" height="92" class="policy"/><text x="510" y="503" text-anchor="middle" class="label">clusterplan</text><text x="510" y="523" text-anchor="middle" class="small">ordered stages</text><text x="510" y="540" text-anchor="middle" class="small">ranges + topology</text>
  <rect x="645" y="465" width="190" height="112" class="policy"/><text x="740" y="493" text-anchor="middle" class="label">stageexec</text><text x="740" y="513" text-anchor="middle" class="small">Generate completion</text><text x="740" y="530" text-anchor="middle" class="small">Execute one pass</text><text x="740" y="547" text-anchor="middle" class="small">callStage transport</text>
  <rect x="880" y="485" width="165" height="72" class="mechanism"/><text x="962" y="513" text-anchor="middle" class="label">stagewire</text><text x="962" y="533" text-anchor="middle" class="small">binary frames</text>
  <rect x="1090" y="485" width="165" height="72" class="mechanism"/><text x="1172" y="513" text-anchor="middle" class="label">inference</text><text x="1172" y="533" text-anchor="middle" class="small">phase/payload contracts</text>

  <rect x="415" y="665" width="180" height="58" class="pkg"/><text x="505" y="690" text-anchor="middle" class="label">api</text><text x="505" y="708" text-anchor="middle" class="small">route constants</text>
  <rect x="700" y="665" width="180" height="58" class="pkg"/><text x="790" y="690" text-anchor="middle" class="label">benchmarks</text><text x="790" y="708" text-anchor="middle" class="small">JSONL records</text>

  <path d="M255 136 H365" class="line"/><path d="M585 136 H740" class="line"/>
