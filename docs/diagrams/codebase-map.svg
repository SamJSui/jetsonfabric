<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">JetsonFabric Codebase Map</title>
  <desc id="desc">A repo tour showing where to start reading and how major directories map to product responsibilities.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:14}.hot{fill:#ecfeff;stroke:#0891b2;stroke-width:3;rx:16}.runtime{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:14}.docs{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:14}.label{font:700 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}.note{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow);fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}
    </style>
  </defs>
  <text x="40" y="45" class="title">Codebase map</text>
  <text x="40" y="70" class="subtitle">Read left to right: CLI starts the node app; node wires membership, discovery, facade, coordinator, bridge, and runtime.</text>

  <rect x="45" y="135" width="175" height="86" class="box"/><text x="132" y="166" text-anchor="middle" class="label">cmd/</text><text x="132" y="189" text-anchor="middle" class="small">jetsonfabric-node</text><text x="132" y="206" text-anchor="middle" class="small">CLI + signals</text>
  <rect x="285" y="110" width="210" height="136" class="hot"/><text x="390" y="143" text-anchor="middle" class="label">internal/node</text><text x="390" y="166" text-anchor="middle" class="small">App lifecycle</text><text x="390" y="183" text-anchor="middle" class="small">config + identity</text><text x="390" y="200" text-anchor="middle" class="small">advertise URL</text><text x="390" y="217" text-anchor="middle" class="small">runtime supervisor</text>
  <rect x="560" y="110" width="210" height="136" class="box"/><text x="665" y="143" text-anchor="middle" class="label">internal/facade</text><text x="665" y="166" text-anchor="middle" class="small">HTTP front door</text><text x="665" y="183" text-anchor="middle" class="small">cluster endpoints</text><text x="665" y="200" text-anchor="middle" class="small">leader proxy</text><text x="665" y="217" text-anchor="middle" class="small">stage route</text>
  <rect x="835" y="110" width="210" height="136" class="runtime"/><text x="940" y="143" text-anchor="middle" class="label">internal/runtimebridge</text><text x="940" y="166" text-anchor="middle" class="small">ChatProxy</text><text x="940" y="183" text-anchor="middle" class="small">StageProxy</text><text x="940" y="200" text-anchor="middle" class="small">Go to runtime HTTP</text>

  <rect x="285" y="330" width="185" height="96" class="box"/><text x="377" y="362" text-anchor="middle" class="label">membership</text><text x="377" y="385" text-anchor="middle" class="small">Member</text><text x="377" y="402" text-anchor="middle" class="small">Store peer cache</text>
  <rect x="505" y="330" width="185" height="96" class="box"/><text x="597" y="362" text-anchor="middle" class="label">discovery</text><text x="597" y="385" text-anchor="middle" class="small">static / mDNS</text><text x="597" y="402" text-anchor="middle" class="small">announce hydrate</text>
  <rect x="725" y="330" width="185" height="96" class="box"/><text x="817" y="362" text-anchor="middle" class="label">election</text><text x="817" y="385" text-anchor="middle" class="small">leader rank</text><text x="817" y="402" text-anchor="middle" class="small">explain reasons</text>
  <rect x="945" y="330" width="185" height="96" class="box"/><text x="1037" y="362" text-anchor="middle" class="label">coordinator</text><text x="1037" y="385" text-anchor="middle" class="small">models</text><text x="1037" y="402" text-anchor="middle" class="small">routes / previews</text>

  <rect x="45" y="545" width="175" height="86" class="docs"/><text x="132" y="576" text-anchor="middle" class="label">configs/</text><text x="132" y="599" text-anchor="middle" class="small">model registry</text><text x="132" y="616" text-anchor="middle" class="small">example profiles</text>
  <rect x="285" y="515" width="210" height="146" class="runtime"/><text x="390" y="548" text-anchor="middle" class="label">runtime/</text><text x="390" y="571" text-anchor="middle" class="small">C++ worker</text><text x="390" y="588" text-anchor="middle" class="small">engine factory</text><text x="390" y="605" text-anchor="middle" class="small">llama.cpp adapter</text><text x="390" y="622" text-anchor="middle" class="small">full-model now</text>
  <rect x="560" y="545" width="210" height="86" class="box"/><text x="665" y="576" text-anchor="middle" class="label">tools/</text><text x="665" y="599" text-anchor="middle" class="small">bench client</text><text x="665" y="616" text-anchor="middle" class="small">developer utilities</text>
  <rect x="835" y="515" width="210" height="146" class="docs"/><text x="940" y="548" text-anchor="middle" class="label">docs/</text><text x="940" y="571" text-anchor="middle" class="small">architecture</text><text x="940" y="588" text-anchor="middle" class="small">diagrams</text><text x="940" y="605" text-anchor="middle" class="small">roadmap context</text><text x="940" y="622" text-anchor="middle" class="small">grokking aids</text>

  <path d="M220 178 H285" class="line"/><path d="M495 178 H560" class="line"/><path d="M770 178 H835" class="line"/><path d="M390 246 V330" class="line"/><path d="M495 178 C540 260, 575 300, 597 330" class="dash"/><path d="M665 246 C700 285, 780 300, 817 330" class="dash"/><path d="M770 178 C875 250, 995 280, 1037 330" class="dash"/><path d="M940 246 C860 400, 510 490, 390 515" class="line"/><path d="M220 588 H285" class="dash"/>

  <text x="238" y="166" class="note">entry</text><text x="512" y="166" class="note">wires</text><text x="790" y="166" class="note">serves</text><text x="740" y="520" class="note">bench / observe</text>
</svg>
