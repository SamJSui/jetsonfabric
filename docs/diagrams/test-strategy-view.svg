<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">JetsonFabric Test Strategy View</title>
  <desc id="desc">Testing diagram showing how unit tests protect behavior from pure data invariants through facade routing and runtime bridge adapters.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.test{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:14}.core{fill:#ecfeff;stroke:#0891b2;stroke-width:3;rx:16}.future{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:14}.runtime{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:14}.label{font:700 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}.note{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow);fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}
    </style>
  </defs>
  <text x="40" y="45" class="title">Test strategy view</text>
  <text x="40" y="70" class="subtitle">Fast unit tests protect package contracts; smoke tests protect real multi-process behavior.</text>

  <rect x="70" y="130" width="210" height="95" class="core"/><text x="175" y="163" text-anchor="middle" class="label">membership tests</text><text x="175" y="186" text-anchor="middle" class="small">Member.Valid / IsStale</text><text x="175" y="203" text-anchor="middle" class="small">Store merge / prune / sort</text>
  <rect x="360" y="130" width="210" height="95" class="test"/><text x="465" y="163" text-anchor="middle" class="label">election tests</text><text x="465" y="186" text-anchor="middle" class="small">leader rank policy</text><text x="465" y="203" text-anchor="middle" class="small">deterministic snapshots</text>
  <rect x="650" y="130" width="210" height="95" class="test"/><text x="755" y="163" text-anchor="middle" class="label">discovery tests</text><text x="755" y="186" text-anchor="middle" class="small">static announce</text><text x="755" y="203" text-anchor="middle" class="small">hydration fallback</text>
  <rect x="940" y="130" width="210" height="95" class="test"/><text x="1045" y="163" text-anchor="middle" class="label">node tests</text><text x="1045" y="186" text-anchor="middle" class="small">identity</text><text x="1045" y="203" text-anchor="middle" class="small">advertise + supervisor</text>

  <rect x="220" y="330" width="230" height="105" class="test"/><text x="335" y="363" text-anchor="middle" class="label">facade tests</text><text x="335" y="386" text-anchor="middle" class="small">cluster endpoints</text><text x="335" y="403" text-anchor="middle" class="small">leader proxy</text><text x="335" y="420" text-anchor="middle" class="small">stage route local</text>
  <rect x="550" y="330" width="230" height="105" class="runtime"/><text x="665" y="363" text-anchor="middle" class="label">runtimebridge tests</text><text x="665" y="386" text-anchor="middle" class="small">ChatProxy validation</text><text x="665" y="403" text-anchor="middle" class="small">StageProxy forwarding</text><text x="665" y="420" text-anchor="middle" class="small">runtime error mapping</text>
  <rect x="880" y="330" width="230" height="105" class="future"/><text x="995" y="363" text-anchor="middle" class="label">clusterplan tests</text><text x="995" y="386" text-anchor="middle" class="small">snapshot to plan</text><text x="995" y="403" text-anchor="middle" class="small">APIURL not RuntimeURL</text><text x="995" y="420" text-anchor="middle" class="small">topology + ranges</text>

  <rect x="360" y="540" width="230" height="95" class="runtime"/><text x="475" y="573" text-anchor="middle" class="label">two-node CPU E2E</text><text x="475" y="596" text-anchor="middle" class="small">real processes</text><text x="475" y="613" text-anchor="middle" class="small">real runtime + model</text>
  <rect x="690" y="540" width="230" height="95" class="runtime"/><text x="805" y="573" text-anchor="middle" class="label">bench / integration</text><text x="805" y="596" text-anchor="middle" class="small">runtime model load</text><text x="805" y="613" text-anchor="middle" class="small">performance data</text>

  <path d="M280 177 H360" class="line"/><path d="M175 225 C195 280, 270 310, 335 330" class="line"/><path d="M465 225 C445 285, 385 310, 335 330" class="line"/><path d="M755 225 C680 285, 530 310, 335 330" class="dash"/><path d="M1045 225 C960 285, 780 310, 665 330" class="dash"/><path d="M450 382 H550" class="line"/><path d="M780 382 H880" class="dash"/><path d="M335 435 C360 500, 415 525, 475 540" class="line"/><path d="M665 435 C635 500, 540 525, 475 540" class="line"/><path d="M995 435 C960 510, 875 525, 805 540" class="dash"/>

  <text x="305" y="165" class="note">pure policy</text><text x="794" y="314" class="note">planning</text><text x="555" y="520" class="note">slower tests</text>
</svg>
