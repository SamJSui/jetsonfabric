<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">Current and Target Generation Call Ownership</title>
  <desc id="desc">Current Go stageexec owns the token and stage loops. Target architecture calls a runtime pipeline leader once and moves those loops into the runtime data plane.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.current{fill:#ecfeff;stroke:#0891b2;stroke-width:2.5;rx:16}.target{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2.5;rx:16}.box{fill:#ffffff;stroke:#334155;stroke-width:1.7;rx:11}.runtime{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:11}.label{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}.code{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#334155}.note{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow);fill:none}.loop{stroke:#ea580c;stroke-width:2;stroke-dasharray:6 5;fill:none}</style></defs>
  <text x="40" y="42" class="title">Generation call ownership: current versus target</text><text x="40" y="68" class="subtitle">“Call once” refers to the API boundary. Internally, autoregressive decoding still requires one forward pass per token.</text>

  <rect x="40" y="105" width="580" height="590" class="current"/><text x="330" y="138" text-anchor="middle" class="label">Current implementation — Go owns both loops</text>
  <rect x="80" y="175" width="500" height="58" class="box"/><text x="330" y="199" text-anchor="middle" class="code">coordinator.handleChatCompletions()</text><text x="330" y="219" text-anchor="middle" class="small">calls stageexec.Generate once</text>
  <rect x="110" y="275" width="440" height="145" class="box"/><text x="330" y="302" text-anchor="middle" class="code">stageexec.Generate()</text><text x="135" y="330" class="small">1. RunPipelinePass(prefill)</text><text x="135" y="351" class="small">2. while more tokens:</text><text x="160" y="372" class="small">RunPipelinePass(decode_step)</text><text x="135" y="393" class="small">3. CloseSession(all stages)</text>
  <rect x="145" y="465" width="370" height="145" class="box"/><text x="330" y="492" text-anchor="middle" class="code">stageexec.RunPipelinePass()</text><text x="170" y="520" class="small">for each planned stage:</text><text x="195" y="542" class="small">callStage(stage, payload)</text><text x="195" y="563" class="small">validate transition</text><text x="195" y="584" class="small">payload = response payload</text>
  <rect x="185" y="635" width="290" height="42" class="runtime"/><text x="330" y="661" text-anchor="middle" class="small">C++ runtime executes one stage pass</text>
  <path d="M330 233 V275" class="line"/><path d="M330 420 V465" class="line"/><path d="M330 610 V635" class="line"/><rect x="92" y="260" width="476" height="375" class="loop"/><text x="105" y="450" class="note">Go repeats token and stage RPC loops</text>

  <rect x="700" y="105" width="580" height="590" class="target"/><text x="990" y="138" text-anchor="middle" class="label">Target architecture — runtime owns generation data plane</text>
  <rect x="740" y="175" width="500" height="58" class="box"/><text x="990" y="199" text-anchor="middle" class="code">coordinator.handleChatCompletions()</text><text x="990" y="219" text-anchor="middle" class="small">select plan epoch; call runtime Generate once</text>
  <rect x="780" y="275" width="420" height="88" class="runtime"/><text x="990" y="302" text-anchor="middle" class="code">PipelineSessionLeader.Generate()</text><text x="805" y="330" class="small">owns session, prefill, decode loop, cancellation</text><text x="805" y="349" class="small">returns one completed/streamed result</text>
  <rect x="790" y="410" width="400" height="180" class="runtime"/><text x="990" y="437" text-anchor="middle" class="code">internal runtime loop</text><text x="815" y="465" class="small">RunPipelinePass(prefill)</text><text x="815" y="489" class="small">while more tokens:</text><text x="840" y="513" class="small">RunPipelinePass(decode_step)</text><text x="815" y="537" class="small">Each pass calls each stage once</text><text x="815" y="561" class="small">Stages exchange activations directly</text>
  <rect x="835" y="635" width="310" height="42" class="runtime"/><text x="990" y="661" text-anchor="middle" class="small">StageExecutor: one assigned-range forward pass</text>
  <path d="M990 233 V275" class="line"/><path d="M990 363 V410" class="line"/><path d="M990 590 V635" class="line"/><rect x="765" y="390" width="450" height="235" class="loop"/><text x="780" y="615" class="note">Runtime repeats the unavoidable internal passes</text>

  <rect x="345" y="718" width="630" height="34" class="box"/><text x="660" y="740" text-anchor="middle" class="small">Generate = full completion; RunPipelinePass = one prefill/decode traversal; ExecuteStage = one stage forward pass.</text>
</svg>
