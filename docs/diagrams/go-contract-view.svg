<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">Go Package Boundary View</title>
  <desc id="desc">Go packages grouped by responsibility, with boundary structs kept separate across API, storage, routing, runtime transport, and benchmarks.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
    .pkg { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .shared { fill: #eef2ff; stroke: #475569; stroke-width: 1.5; rx: 8; }
    .runtime { fill: #fff7ed; stroke: #9a3412; stroke-width: 1.5; rx: 8; }
    .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
    .small { font: 13px Arial, sans-serif; fill: #334155; }
    .code { font: 12px Consolas, monospace; fill: #334155; }
    .arrow { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>

  <rect class="bg" width="1080" height="520"/>
  <text class="title" x="40" y="44">Go Package Boundary View</text>
  <text class="small" x="40" y="68">DRY construction logic, but keep boundary structs separate so API, storage, routing, transport, and benchmarks can evolve independently.</text>

  <rect class="shared" x="420" y="110" width="240" height="100"/>
  <text class="label" x="468" y="140">internal/cluster</text>
  <text class="code" x="448" y="166">NodeRecord</text>
  <text class="code" x="448" y="186">HeartbeatRequest</text>

  <rect class="pkg" x="80" y="260" width="210" height="105"/>
  <text class="label" x="125" y="292">internal/agent</text>
  <text class="code" x="108" y="318">Client.SendHeartbeat</text>
  <text class="code" x="108" y="338">Server proxy API</text>

  <rect class="pkg" x="420" y="260" width="240" height="105"/>
  <text class="label" x="460" y="292">internal/control</text>
  <text class="code" x="448" y="318">node registry</text>
  <text class="code" x="448" y="338">route selection</text>

  <rect class="pkg" x="790" y="260" width="210" height="105"/>
  <text class="label" x="835" y="292">internal/chat</text>
  <text class="code" x="818" y="318">CompletionRequest</text>
  <text class="code" x="818" y="338">RouteMetadata</text>

  <rect class="runtime" x="80" y="405" width="210" height="80"/>
  <text class="label" x="117" y="437">internal/layersplit</text>
  <text class="code" x="108" y="463">Stage + Activation</text>

  <rect class="pkg" x="420" y="405" width="240" height="80"/>
  <text class="label" x="458" y="437">internal/routing</text>
  <text class="code" x="448" y="463">PlacementPreview</text>

  <rect class="pkg" x="790" y="405" width="210" height="80"/>
  <text class="label" x="826" y="437">internal/benchmarks</text>
  <text class="code" x="818" y="463">Record</text>

  <path class="arrow" d="M185 260 V210 H420"/>
  <path class="arrow" d="M540 210 V260"/>
  <path class="arrow" d="M660 312 H790"/>
  <path class="arrow" d="M540 365 V405"/>
  <path class="arrow" d="M660 330 C720 350 760 390 790 430"/>
  <path class="arrow" d="M420 320 H290"/>
  <path class="arrow" d="M185 365 V405"/>

  <text class="small" x="690" y="150">Shared cluster contracts</text>
  <text class="small" x="690" y="170">should stay small and boring.</text>
</svg>
