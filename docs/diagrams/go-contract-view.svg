<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Go Package Boundary View</title>
  <desc id="desc">Current Go package boundaries for node lifecycle, membership, discovery, election, facade, planning, stage wire contracts, execution, and runtime bridging.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:14}.core{fill:#ecfeff;stroke:#0891b2;stroke-width:3;rx:18}.data{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:14}.runtime{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:14}.label{font:700 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}.note{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow);fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}</style></defs>
  <text x="40" y="45" class="title">Go package boundary view</text><text x="40" y="70" class="subtitle">The node app wires focused packages together; semantic rules live in inference and wire framing lives in stagewire.</text>
  <rect x="60" y="120" width="200" height="92" class="box"/><text x="160" y="153" text-anchor="middle" class="label">cmd/jetsonfabric-node</text><text x="160" y="176" text-anchor="middle" class="small">flags</text><text x="160" y="193" text-anchor="middle" class="small">signals</text>
  <rect x="360" y="105" width="250" height="122" class="core"/><text x="485" y="138" text-anchor="middle" class="label">internal/node</text><text x="485" y="161" text-anchor="middle" class="small">config + identity</text><text x="485" y="178" text-anchor="middle" class="small">HTTP server setup</text><text x="485" y="195" text-anchor="middle" class="small">runtime supervision</text>
  <rect x="740" y="120" width="200" height="92" class="data"/><text x="840" y="153" text-anchor="middle" class="label">internal/cluster</text><text x="840" y="176" text-anchor="middle" class="small">models + engines</text><text x="840" y="193" text-anchor="middle" class="small">modes + compute</text>
  <rect x="60" y="300" width="200" height="102" class="box"/><text x="160" y="333" text-anchor="middle" class="label">internal/discovery</text><text x="160" y="356" text-anchor="middle" class="small">static + mDNS</text><text x="160" y="373" text-anchor="middle" class="small">announce hydration</text>
  <rect x="330" y="300" width="200" height="102" class="box"/><text x="430" y="333" text-anchor="middle" class="label">internal/membership</text><text x="430" y="356" text-anchor="middle" class="small">Member + Store</text><text x="430" y="373" text-anchor="middle" class="small">local peer cache</text>
  <rect x="600" y="300" width="200" height="102" class="box"/><text x="700" y="333" text-anchor="middle" class="label">internal/election</text><text x="700" y="356" text-anchor="middle" class="small">coordinator ranking</text><text x="700" y="373" text-anchor="middle" class="small">tracker epoch</text>
  <rect x="870" y="300" width="230" height="102" class="box"/><text x="985" y="333" text-anchor="middle" class="label">internal/facade</text><text x="985" y="356" text-anchor="middle" class="small">any-node endpoints</text><text x="985" y="373" text-anchor="middle" class="small">coordinator proxy</text><text x="985" y="390" text-anchor="middle" class="small">local stage route</text>
  <rect x="80" y="520" width="190" height="105" class="box"/><text x="175" y="553" text-anchor="middle" class="label">internal/coordinator</text><text x="175" y="576" text-anchor="middle" class="small">model registry</text><text x="175" y="593" text-anchor="middle" class="small">route + run handlers</text>
  <rect x="315" y="520" width="190" height="105" class="data"/><text x="410" y="553" text-anchor="middle" class="label">internal/clusterplan</text><text x="410" y="576" text-anchor="middle" class="small">count arithmetic</text><text x="410" y="593" text-anchor="middle" class="small">topology metadata</text>
  <rect x="550" y="520" width="190" height="105" class="data"/><text x="645" y="553" text-anchor="middle" class="label">internal/stagewire</text><text x="645" y="576" text-anchor="middle" class="small">stage_index/count</text><text x="645" y="593" text-anchor="middle" class="small">wire payload contract</text>
  <rect x="785" y="520" width="190" height="105" class="box"/><text x="880" y="553" text-anchor="middle" class="label">internal/stageexec</text><text x="880" y="576" text-anchor="middle" class="small">ordered handoff</text><text x="880" y="593" text-anchor="middle" class="small">per-stage traces</text>
  <rect x="1010" y="520" width="170" height="105" class="runtime"/><text x="1095" y="553" text-anchor="middle" class="label">runtimebridge</text><text x="1095" y="576" text-anchor="middle" class="small">chat adapter</text><text x="1095" y="593" text-anchor="middle" class="small">stage proxy</text>
  <rect x="425" y="675" width="350" height="48" class="runtime"/><text x="600" y="705" text-anchor="middle" class="small">C++ runtime worker hosts inference-engine adapters</text>
  <path d="M260 166 H360" class="line"/><path d="M610 166 H740" class="line"/><path d="M485 227 V300" class="line"/><path d="M260 351 H330" class="line"/><path d="M530 351 H600" class="line"/><path d="M800 351 H870" class="line"/><path d="M985 402 C900 470,300 490,175 520" class="line"/><path d="M270 572 H315" class="line"/><path d="M505 572 H550" class="line"/><path d="M740 572 H785" class="line"/><path d="M975 572 H1010" class="line"/><path d="M1095 625 C1000 675,800 690,775 699" class="line"/>
  <text x="292" y="154" class="note">builds app</text><text x="280" y="337" class="note">members</text><text x="548" y="337" class="note">snapshot</text><text x="817" y="337" class="note">coordinator</text>
</svg>
