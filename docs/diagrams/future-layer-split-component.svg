<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Membership-Backed Cluster Planning Component View</title>
  <desc id="desc">Current route planning consumes fresh membership snapshots and produces count-aware stage plans that call peer API URLs.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:14}.leader{fill:#ecfeff;stroke:#0891b2;stroke-width:3;rx:18}.stage{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:14}.policy{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:14}.label{font:700 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}.note{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow);fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}</style></defs>
  <text x="40" y="45" class="title">Membership-backed cluster planning</text><text x="40" y="70" class="subtitle">Fresh members, requested stage count, layer arithmetic, and objective topology metadata.</text>
  <rect x="45" y="140" width="190" height="96" class="box"/><text x="140" y="173" text-anchor="middle" class="label">membership.Store</text><text x="140" y="196" text-anchor="middle" class="small">local peer cache</text><text x="140" y="213" text-anchor="middle" class="small">fresh + stale records</text>
  <rect x="295" y="140" width="190" height="96" class="box"/><text x="390" y="173" text-anchor="middle" class="label">Fresh snapshot</text><text x="390" y="196" text-anchor="middle" class="small">immutable per request</text><text x="390" y="213" text-anchor="middle" class="small">eligible members only</text>
  <rect x="545" y="120" width="235" height="136" class="leader"/><text x="662" y="153" text-anchor="middle" class="label">internal/clusterplan</text><text x="662" y="176" text-anchor="middle" class="small">filters engine + compute</text><text x="662" y="193" text-anchor="middle" class="small">selects requested stage count</text><text x="662" y="210" text-anchor="middle" class="small">assigns layer ranges</text><text x="662" y="227" text-anchor="middle" class="small">returns topology counts</text>
  <rect x="845" y="140" width="290" height="96" class="policy"/><text x="990" y="173" text-anchor="middle" class="label">Planning policy</text><text x="990" y="196" text-anchor="middle" class="small">allow_colocated_stages=false by default</text><text x="990" y="213" text-anchor="middle" class="small">dev override reports topology=colocated</text>
  <rect x="80" y="345" width="235" height="130" class="stage"/><text x="197" y="378" text-anchor="middle" class="label">Stage index 0</text><text x="197" y="401" text-anchor="middle" class="small">peer APIURL</text><text x="197" y="418" text-anchor="middle" class="small">stage_count=N</text><text x="197" y="435" text-anchor="middle" class="small">assigned layer range</text><text x="197" y="452" text-anchor="middle" class="small">local runtime worker</text>
  <rect x="485" y="345" width="230" height="130" class="stage"/><text x="600" y="378" text-anchor="middle" class="label">Stage payload</text><text x="600" y="401" text-anchor="middle" class="small">request_id + decode_step</text><text x="600" y="418" text-anchor="middle" class="small">payload_kind</text><text x="600" y="435" text-anchor="middle" class="small">dtype + shape for tensors</text><text x="600" y="452" text-anchor="middle" class="small">text now; activation next</text>
  <rect x="885" y="345" width="235" height="130" class="stage"/><text x="1002" y="378" text-anchor="middle" class="label">Stage index N-1</text><text x="1002" y="401" text-anchor="middle" class="small">peer APIURL</text><text x="1002" y="418" text-anchor="middle" class="small">stage_count=N</text><text x="1002" y="435" text-anchor="middle" class="small">assigned layer range</text><text x="1002" y="452" text-anchor="middle" class="small">local runtime worker</text>
  <rect x="380" y="560" width="440" height="70" class="box"/><text x="600" y="590" text-anchor="middle" class="label">Current limitation</text><text x="600" y="613" text-anchor="middle" class="small">llama.cpp still performs full-model generation; assigned-layer activation execution is next</text>
  <path d="M235 188 H295" class="line"/><path d="M485 188 H545" class="line"/><path d="M780 188 H845" class="line"/><path d="M662 256 C610 300,360 325,197 345" class="line"/><path d="M315 410 H485" class="line"/><path d="M715 410 H885" class="line"/><path d="M600 475 V560" class="dash"/>
  <text x="250" y="176" class="note">filter stale</text><text x="497" y="176" class="note">plan from snapshot</text><text x="780" y="176" class="note">count + topology policy</text><text x="350" y="395" class="note">typed output</text><text x="750" y="395" class="note">typed input</text>
</svg>
