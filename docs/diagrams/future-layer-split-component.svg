<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 800" role="img" aria-labelledby="title desc">
  <title id="title">Target Dynamic Model Deployment and Pipeline Component View</title>
  <desc id="desc">Target architecture: the coordinator publishes versioned deployment plans while each runtime dynamically loads model partitions and a runtime pipeline leader owns generation.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.control{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2.5;rx:16}.node{fill:#ecfeff;stroke:#0891b2;stroke-width:2.5;rx:17}.runtime{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:12}.box{fill:#ffffff;stroke:#334155;stroke-width:1.7;rx:10}.label{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}.note{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow);fill:none}.prepare{stroke:#7c3aed;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}.data{stroke:#ea580c;stroke-width:2.5;marker-end:url(#arrow);fill:none}</style></defs>
  <text x="40" y="42" class="title">Target: dynamic model deployment and rebalance</text><text x="40" y="68" class="subtitle">The coordinator controls desired deployment epochs. Runtimes load partitions on demand. Existing sessions remain pinned while a new plan warms up.</text>

  <rect x="35" y="105" width="300" height="200" class="control"/><text x="185" y="135" text-anchor="middle" class="label">Coordinator / PlacementController</text><text x="65" y="165" class="small">membership + resource snapshot</text><text x="65" y="184" class="small">model artifact catalog</text><text x="65" y="203" class="small">choose node order and layer ranges</text><text x="65" y="222" class="small">publish DeploymentPlan epoch N</text><text x="65" y="241" class="small">route new sessions to active epoch</text><text x="65" y="260" class="small">drain and retire older epochs</text><text x="65" y="282" class="small">backend affects scoring, not tensor compatibility</text>

  <rect x="380" y="105" width="900" height="620" class="box"/><text x="830" y="135" text-anchor="middle" class="label">Three-node deployment after rebalance</text>

  <rect x="410" y="170" width="255" height="490" class="node"/><text x="537" y="198" text-anchor="middle" class="label">Node A</text>
  <rect x="435" y="225" width="205" height="62" class="box"/><text x="537" y="251" text-anchor="middle" class="label">Go node service</text><text x="537" y="270" text-anchor="middle" class="small">discovery + stage gateway</text>
  <rect x="435" y="315" width="205" height="290" class="runtime"/><text x="537" y="343" text-anchor="middle" class="label">C++ RuntimeService</text><text x="457" y="374" class="small">ModelManager</text><text x="457" y="393" class="small">  prepare(model H, [0,10))</text><text x="457" y="418" class="small">ModelCache</text><text x="457" y="437" class="small">  key = hash + range + config</text><text x="457" y="462" class="small">SessionManager</text><text x="457" y="481" class="small">  pins deployment epoch</text><text x="457" y="506" class="small">StageExecutor</text><text x="457" y="525" class="small">  prefill/decode [0,10)</text><text x="457" y="550" class="small">Lifecycle</text><text x="457" y="569" class="small">  load → ready → drain → evict</text>
  <text x="537" y="635" text-anchor="middle" class="small">epoch 2: stage 0, layers [0,10)</text>

  <rect x="690" y="170" width="255" height="490" class="node"/><text x="817" y="198" text-anchor="middle" class="label">Node B</text>
  <rect x="715" y="225" width="205" height="62" class="box"/><text x="817" y="251" text-anchor="middle" class="label">Go node service</text><text x="817" y="270" text-anchor="middle" class="small">discovery + stage gateway</text>
  <rect x="715" y="315" width="205" height="290" class="runtime"/><text x="817" y="343" text-anchor="middle" class="label">C++ RuntimeService</text><text x="737" y="374" class="small">ModelManager</text><text x="737" y="393" class="small">  prepare(model H, [10,19))</text><text x="737" y="418" class="small">ModelCache</text><text x="737" y="437" class="small">  stage-local weights/KV</text><text x="737" y="462" class="small">SessionManager</text><text x="737" y="481" class="small">  tracks active sessions</text><text x="737" y="506" class="small">StageExecutor</text><text x="737" y="525" class="small">  activation → activation</text><text x="737" y="550" class="small">Ready report</text><text x="737" y="569" class="small">  model hash + range + memory</text>
  <text x="817" y="635" text-anchor="middle" class="small">epoch 2: stage 1, layers [10,19)</text>

  <rect x="970" y="170" width="255" height="490" class="node"/><text x="1097" y="198" text-anchor="middle" class="label">Node C — newly joined</text>
  <rect x="995" y="225" width="205" height="62" class="box"/><text x="1097" y="251" text-anchor="middle" class="label">Go node service</text><text x="1097" y="270" text-anchor="middle" class="small">advertises capacity + artifacts</text>
  <rect x="995" y="315" width="205" height="290" class="runtime"/><text x="1097" y="343" text-anchor="middle" class="label">C++ RuntimeService</text><text x="1017" y="374" class="small">ModelManager</text><text x="1017" y="393" class="small">  prepare(model H, [19,28))</text><text x="1017" y="418" class="small">ModelCache</text><text x="1017" y="437" class="small">  load only required partition</text><text x="1017" y="462" class="small">SessionManager</text><text x="1017" y="481" class="small">  accepts epoch 2 sessions</text><text x="1017" y="506" class="small">StageExecutor</text><text x="1017" y="525" class="small">  final norm + logits + token</text><text x="1017" y="550" class="small">Generation leader candidate</text><text x="1017" y="569" class="small">  direct runtime data plane</text>
  <text x="1097" y="635" text-anchor="middle" class="small">epoch 2: stage 2, layers [19,28)</text>

  <path d="M335 175 C370 175,390 230,435 245" class="prepare"/><path d="M335 205 C500 120,650 170,715 245" class="prepare"/><path d="M335 235 C600 90,950 140,995 245" class="prepare"/><text x="520" y="108" class="note">PrepareDeployment(epoch 2)</text>
  <path d="M640 505 H715" class="data"/><text x="677" y="493" text-anchor="middle" class="note">activation</text><path d="M920 505 H995" class="data"/><text x="957" y="493" text-anchor="middle" class="note">activation</text>
  <path d="M435 585 C370 610,350 300,335 270" class="prepare"/><path d="M715 585 C620 670,420 650,335 270" class="prepare"/><path d="M995 585 C800 745,500 700,335 270" class="prepare"/><text x="430" y="705" class="note">Ready reports → publish epoch only when every partition is ready</text>
  <rect x="380" y="745" width="900" height="38" class="control"/><text x="830" y="770" text-anchor="middle" class="small">Old sessions remain on epoch 1 ([0,14), [14,28)) until drained; new sessions use epoch 2. Never migrate live KV state mid-generation.</text>
</svg>
