<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 720" role="img" aria-labelledby="title desc">
  <title id="title">Node Discovery And Membership Hydration Sequence</title>
  <desc id="desc">Current sequence: a node binds, starts runtime, upserts self, advertises, discovers peers, hydrates peer records, and merges them into local membership.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 25px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitle { font: 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .head { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 12; }
      .peer { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 12; }
      .store { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 12; }
      .label { font: 700 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .small { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; }
      .line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5 6; }
      .msg { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .return { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow); fill: none; }
      .note { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>

  <text x="40" y="42" class="title">Node discovery and membership hydration</text>
  <text x="40" y="67" class="subtitle">Every node builds its own local membership view; discovery is advisory and eventually consistent.</text>

  <rect x="70" y="105" width="150" height="50" class="head"/>
  <text x="145" y="136" text-anchor="middle" class="label">Node A App</text>
  <line x1="145" y1="155" x2="145" y2="660" class="line"/>

  <rect x="290" y="105" width="160" height="50" class="store"/>
  <text x="370" y="136" text-anchor="middle" class="label">Local Store</text>
  <line x1="370" y1="155" x2="370" y2="660" class="line"/>

  <rect x="520" y="105" width="170" height="50" class="head"/>
  <text x="605" y="136" text-anchor="middle" class="label">Discovery Loop</text>
  <line x1="605" y1="155" x2="605" y2="660" class="line"/>

  <rect x="755" y="105" width="150" height="50" class="peer"/>
  <text x="830" y="136" text-anchor="middle" class="label">mDNS / Seeds</text>
  <line x1="830" y1="155" x2="830" y2="660" class="line"/>

  <rect x="970" y="105" width="145" height="50" class="peer"/>
  <text x="1042" y="136" text-anchor="middle" class="label">Peer Node B</text>
  <line x1="1042" y1="155" x2="1042" y2="660" class="line"/>

  <path d="M145 190 H370" class="msg"/>
  <text x="257" y="178" text-anchor="middle" class="small">Upsert(self)</text>

  <path d="M145 245 H605" class="msg"/>
  <text x="375" y="233" text-anchor="middle" class="small">start discovery loop</text>

  <path d="M145 300 H830" class="msg"/>
  <text x="488" y="288" text-anchor="middle" class="small">advertise self over mDNS if enabled</text>

  <path d="M605 355 H830" class="msg"/>
  <text x="718" y="343" text-anchor="middle" class="small">browse / read seeds</text>

  <path d="M830 410 H605" class="return"/>
  <text x="718" y="398" text-anchor="middle" class="small">lightweight peer records</text>

  <path d="M605 465 H1042" class="msg"/>
  <text x="824" y="453" text-anchor="middle" class="small">POST /v1/cluster/announce self</text>

  <path d="M1042 520 H605" class="return"/>
  <text x="824" y="508" text-anchor="middle" class="small">full member list / capabilities</text>

  <path d="M605 575 H370" class="msg"/>
  <text x="488" y="563" text-anchor="middle" class="small">Upsert(peer), merge rich fields</text>

  <rect x="250" y="610" width="670" height="58" class="note"/>
  <text x="585" y="635" text-anchor="middle" class="label">Invariant</text>
  <text x="585" y="654" text-anchor="middle" class="small">Membership.Store is a local peer cache. Nodes may temporarily disagree; request planning should snapshot fresh members.</text>
</svg>
