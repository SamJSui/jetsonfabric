<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Model Registry And Runtime Artifact Flow</title>
  <desc id="desc">Current flow: the Go node loads model metadata and supervises a C++ runtime that loads local GGUF artifacts.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 26px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitle { font: 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; }
      .go { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 14; }
      .runtime { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 14; }
      .warn { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; rx: 14; }
      .label { font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .small { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; }
      .note { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <text x="40" y="45" class="title">Model registry and runtime artifact flow</text>
  <text x="40" y="70" class="subtitle">The Go node plans and records metadata; the C++ runtime owns local model loading and generation.</text>

  <rect x="45" y="130" width="210" height="105" class="box"/>
  <text x="150" y="164" text-anchor="middle" class="label">configs/models*.json</text>
  <text x="150" y="187" text-anchor="middle" class="small">model IDs</text>
  <text x="150" y="204" text-anchor="middle" class="small">layer count</text>
  <text x="150" y="221" text-anchor="middle" class="small">placement modes</text>

  <rect x="330" y="115" width="230" height="135" class="go"/>
  <text x="445" y="148" text-anchor="middle" class="label">modelregistry</text>
  <text x="445" y="171" text-anchor="middle" class="small">loads metadata</text>
  <text x="445" y="188" text-anchor="middle" class="small">does not load weights</text>
  <text x="445" y="205" text-anchor="middle" class="small">feeds coordinator</text>
  <text x="445" y="222" text-anchor="middle" class="small">route preview input</text>

  <rect x="650" y="115" width="230" height="135" class="go"/>
  <text x="765" y="148" text-anchor="middle" class="label">node.Config</text>
  <text x="765" y="171" text-anchor="middle" class="small">--model</text>
  <text x="765" y="188" text-anchor="middle" class="small">--model-path</text>
  <text x="765" y="205" text-anchor="middle" class="small">runtime settings</text>
  <text x="765" y="222" text-anchor="middle" class="small">supervision args</text>

  <rect x="960" y="130" width="200" height="105" class="runtime"/>
  <text x="1060" y="164" text-anchor="middle" class="label">local GGUF file</text>
  <text x="1060" y="187" text-anchor="middle" class="small">models/qwen.gguf</text>
  <text x="1060" y="204" text-anchor="middle" class="small">node-local artifact</text>

  <rect x="330" y="360" width="230" height="120" class="go"/>
  <text x="445" y="393" text-anchor="middle" class="label">Coordinator</text>
  <text x="445" y="416" text-anchor="middle" class="small">model registry</text>
  <text x="445" y="433" text-anchor="middle" class="small">route endpoints</text>
  <text x="445" y="450" text-anchor="middle" class="small">benchmark recorder</text>

  <rect x="650" y="345" width="230" height="150" class="go"/>
  <text x="765" y="378" text-anchor="middle" class="label">Runtime supervisor</text>
  <text x="765" y="401" text-anchor="middle" class="small">builds runtime args</text>
  <text x="765" y="418" text-anchor="middle" class="small">starts worker process</text>
  <text x="765" y="435" text-anchor="middle" class="small">waits for /healthz</text>
  <text x="765" y="452" text-anchor="middle" class="small">returns runtime URL</text>

  <rect x="960" y="345" width="200" height="150" class="runtime"/>
  <text x="1060" y="378" text-anchor="middle" class="label">C++ runtime</text>
  <text x="1060" y="401" text-anchor="middle" class="small">llama.cpp adapter</text>
  <text x="1060" y="418" text-anchor="middle" class="small">loads model path</text>
  <text x="1060" y="435" text-anchor="middle" class="small">generates full text</text>
  <text x="1060" y="452" text-anchor="middle" class="small">partial layers later</text>

  <rect x="45" y="515" width="515" height="70" class="warn"/>
  <text x="302" y="545" text-anchor="middle" class="label">Remote planning rule</text>
  <text x="302" y="568" text-anchor="middle" class="small">Peers call member.APIURL + /v1/layer-split/stage, never another node's loopback RuntimeURL.</text>

  <path d="M255 182 H330" class="line"/>
  <path d="M560 182 H650" class="line"/>
  <path d="M880 182 H960" class="line"/>
  <path d="M445 250 V360" class="line"/>
  <path d="M765 250 V345" class="line"/>
  <path d="M880 420 H960" class="line"/>
  <path d="M1060 235 V345" class="dash"/>
  <path d="M560 550 H690" class="dash"/>

  <text x="275" y="170" class="note">metadata</text>
  <text x="585" y="170" class="note">selected model</text>
  <text x="895" y="170" class="note">path</text>
  <text x="890" y="408" class="note">local HTTP</text>
</svg>
