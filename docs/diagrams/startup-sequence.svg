<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Node Startup Sequence</title>
  <desc id="desc">Sequence diagram for make run-node through config, identity, listener bind, runtime supervision, membership upsert, discovery, and HTTP serving.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .title{font:700 25px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.head{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:12}.runtime{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:12}.store{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.label{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}.line{stroke:#94a3b8;stroke-width:2;stroke-dasharray:5 6}.msg{stroke:#334155;stroke-width:2;marker-end:url(#arrow);fill:none}.return{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}.note{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:10}
    </style>
  </defs>
  <text x="40" y="42" class="title">Node startup sequence</text>
  <text x="40" y="67" class="subtitle">Bind first, derive actual URLs second, advertise third. This keeps local multi-instance runs safe.</text>

  <rect x="40" y="105" width="115" height="50" class="head"/><text x="98" y="136" text-anchor="middle" class="label">User</text><line x1="98" y1="155" x2="98" y2="700" class="line"/>
  <rect x="210" y="105" width="115" height="50" class="head"/><text x="268" y="136" text-anchor="middle" class="label">CLI</text><line x1="268" y1="155" x2="268" y2="700" class="line"/>
  <rect x="380" y="105" width="115" height="50" class="head"/><text x="438" y="136" text-anchor="middle" class="label">App</text><line x1="438" y1="155" x2="438" y2="700" class="line"/>
  <rect x="550" y="105" width="125" height="50" class="head"/><text x="612" y="136" text-anchor="middle" class="label">HTTP</text><line x1="612" y1="155" x2="612" y2="700" class="line"/>
  <rect x="730" y="105" width="125" height="50" class="runtime"/><text x="792" y="136" text-anchor="middle" class="label">Runtime</text><line x1="792" y1="155" x2="792" y2="700" class="line"/>
  <rect x="910" y="105" width="120" height="50" class="store"/><text x="970" y="136" text-anchor="middle" class="label">Store</text><line x1="970" y1="155" x2="970" y2="700" class="line"/>
  <rect x="1075" y="105" width="100" height="50" class="head"/><text x="1125" y="136" text-anchor="middle" class="label">Discovery</text><line x1="1125" y1="155" x2="1125" y2="700" class="line"/>

  <path d="M98 190 H268" class="msg"/><text x="183" y="178" text-anchor="middle" class="small">make run-node</text>
  <path d="M268 235 H438" class="msg"/><text x="353" y="223" text-anchor="middle" class="small">node.New(cfg)</text>
  <path d="M438 280 H438" class="msg"/><text x="520" y="284" class="small">NormalizeConfig</text>
  <path d="M438 320 H438" class="msg"/><text x="520" y="324" class="small">PrepareInstanceConfig</text>
  <path d="M438 360 H438" class="msg"/><text x="520" y="364" class="small">LoadOrCreateNodeID</text>
  <path d="M268 405 H438" class="msg"/><text x="353" y="393" text-anchor="middle" class="small">Run(ctx)</text>
  <path d="M438 450 H612" class="msg"/><text x="525" y="438" text-anchor="middle" class="small">net.Listen(0.0.0.0:0)</text>
  <path d="M612 495 H438" class="return"/><text x="525" y="483" text-anchor="middle" class="small">actual API port</text>
  <path d="M438 540 H792" class="msg"/><text x="615" y="528" text-anchor="middle" class="small">StartRuntimeSupervisor</text>
  <path d="M792 585 H438" class="return"/><text x="615" y="573" text-anchor="middle" class="small">runtime URL healthy</text>
  <path d="M438 625 H970" class="msg"/><text x="704" y="613" text-anchor="middle" class="small">Upsert(self with APIURL + RuntimeURL)</text>
  <path d="M438 665 H1125" class="msg"/><text x="781" y="653" text-anchor="middle" class="small">start advertisement + discovery loop</text>

  <rect x="150" y="690" width="900" height="52" class="note"/><text x="600" y="712" text-anchor="middle" class="label">Startup invariant</text><text x="600" y="731" text-anchor="middle" class="small">Do not publish self until listener and runtime-derived URLs are known.</text>
</svg>
