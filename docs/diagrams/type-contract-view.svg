<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 850" role="img" aria-labelledby="title desc">
  <title id="title">JetsonFabric Current Type and Method Contracts</title>
  <desc id="desc">The most important Go structs and C++ classes in the current distributed generation path.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.subtitle{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.go{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:14}.policy{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:14}.wire{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:14}.cpp{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:14}.label{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.small{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#334155}.caption{font:12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}.line{stroke:#334155;stroke-width:2;marker-end:url(#arrow);fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}</style></defs>
  <text x="40" y="42" class="title">Current type and method contracts</text><text x="40" y="68" class="subtitle">Go structs coordinate a request; C++ classes own model execution and persistent stage-local session state.</text>

  <rect x="45" y="105" width="235" height="155" class="go"/><text x="162" y="135" text-anchor="middle" class="label">node.App</text><text x="70" y="162" class="small">cfg Config</text><text x="70" y="181" class="small">store *membership.Store</text><text x="70" y="200" class="small">server *http.Server</text><text x="70" y="219" class="small">runtimeSupervisor</text><text x="70" y="243" class="small">Run(ctx), shutdown()</text>
  <rect x="335" y="105" width="250" height="155" class="policy"/><text x="460" y="135" text-anchor="middle" class="label">coordinator.Server</text><text x="360" y="162" class="small">registry Registry</text><text x="360" y="181" class="small">memberSource</text><text x="360" y="200" class="small">handleChatCompletions()</text><text x="360" y="219" class="small">selectPipelineRuntimeMembers()</text><text x="360" y="238" class="small">stageexec.Generate()</text>
  <rect x="640" y="105" width="250" height="155" class="policy"/><text x="765" y="135" text-anchor="middle" class="label">clusterplan.RoutePreview</text><text x="665" y="162" class="small">Mode, Topology</text><text x="665" y="181" class="small">StageCount</text><text x="665" y="200" class="small">Stages []Stage</text><text x="665" y="219" class="small">Warnings, Reason</text><text x="665" y="238" class="small">Preview(Request)</text>
  <rect x="945" y="95" width="315" height="175" class="policy"/><text x="1102" y="125" text-anchor="middle" class="label">stageexec.Executor</text><text x="970" y="152" class="small">Generate(ctx, Request)</text><text x="970" y="171" class="small">  full completion lifecycle</text><text x="970" y="194" class="small">Execute(ctx, Request)</text><text x="970" y="213" class="small">  one prefill/decode pipeline pass</text><text x="970" y="236" class="small">callStage(stage, request)</text><text x="970" y="255" class="small">CloseSession(session, plan)</text>

  <rect x="120" y="360" width="250" height="165" class="go"/><text x="245" y="390" text-anchor="middle" class="label">membership.Member</text><text x="145" y="417" class="small">NodeID, NodeName, APIURL</text><text x="145" y="436" class="small">Capabilities, Engines</text><text x="145" y="455" class="small">LastSeen</text><text x="145" y="479" class="small">Valid(), IsStale()</text><text x="145" y="498" class="small">configured partition metadata</text>
  <rect x="420" y="350" width="250" height="185" class="wire"/><text x="545" y="380" text-anchor="middle" class="label">stagewire.Metadata</text><text x="445" y="407" class="small">Operation</text><text x="445" y="426" class="small">SessionID, RequestID</text><text x="445" y="445" class="small">ModelID, Phase, DecodeStep</text><text x="445" y="464" class="small">StageIndex, StageCount</text><text x="445" y="483" class="small">LayerStart, LayerEnd</text><text x="445" y="502" class="small">PayloadKind, dtype, shape</text>
  <rect x="720" y="360" width="250" height="165" class="wire"/><text x="845" y="390" text-anchor="middle" class="label">stageexec.StageTrace</text><text x="745" y="417" class="small">RequestID, SessionID</text><text x="745" y="436" class="small">StageIndex, NodeID</text><text x="745" y="455" class="small">LatencyMS, BytesIn/Out</text><text x="745" y="474" class="small">PayloadKindIn/Out</text><text x="745" y="493" class="small">CRC32In/Out</text>
  <rect x="1020" y="350" width="250" height="185" class="wire"/><text x="1145" y="380" text-anchor="middle" class="label">inference contracts</text><text x="1045" y="407" class="small">Phase</text><text x="1045" y="426" class="small">StagePosition</text><text x="1045" y="445" class="small">LayerRange</text><text x="1045" y="464" class="small">Payload + TensorDescriptor</text><text x="1045" y="483" class="small">ValidatePayloadTransition()</text><text x="1045" y="502" class="small">StageInput / StageOutput</text>

  <rect x="85" y="645" width="250" height="145" class="cpp"/><text x="210" y="675" text-anchor="middle" class="label">RuntimeService</text><text x="110" y="702" class="small">run_stage(body)</text><text x="110" y="721" class="small">decode_stage_request()</text><text x="110" y="740" class="small">dispatch execute/close</text>
  <rect x="385" y="625" width="250" height="185" class="cpp"/><text x="510" y="655" text-anchor="middle" class="label">StageWorker</text><text x="410" y="682" class="small">configured model ID</text><text x="410" y="701" class="small">configured StageAssignment</text><text x="410" y="725" class="small">run(request)</text><text x="410" y="744" class="small">validate_request()</text><text x="410" y="763" class="small">close_session()</text><text x="410" y="782" class="small">protocol ↔ inference</text>
  <rect x="685" y="645" width="250" height="145" class="cpp"/><text x="810" y="675" text-anchor="middle" class="label">LayerExecutor</text><text x="710" y="702" class="small">execute(StageInput)</text><text x="710" y="721" class="small">close_session(sessionID)</text><text x="710" y="744" class="small">engine-neutral interface</text>
  <rect x="985" y="625" width="285" height="185" class="cpp"/><text x="1127" y="655" text-anchor="middle" class="label">LlamaCppStageAdapter</text><text x="1010" y="682" class="small">model *LlamaCppModel</text><text x="1010" y="701" class="small">configured position + layers</text><text x="1010" y="720" class="small">sessions map[sessionID]Context</text><text x="1010" y="744" class="small">execute(), create_context()</text><text x="1010" y="763" class="small">prune_expired_sessions()</text><text x="1010" y="782" class="small">llama_decode + sampling</text>

