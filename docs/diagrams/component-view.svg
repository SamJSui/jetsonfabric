<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">JetsonFabric Component View</title>
  <desc id="desc">Control plane routes P0 prompts to a Jetson agent proxy and future layer split runtime processes exchange activations directly.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="dash-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
    .label { font: 600 15px Arial, sans-serif; fill: #0f172a; }
    .small { font: 13px Arial, sans-serif; fill: #334155; }
    .tiny { font: 12px Arial, sans-serif; fill: #475569; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .node { fill: #eef2ff; stroke: #475569; stroke-width: 1.5; rx: 10; }
    .runtime { fill: #fff7ed; stroke: #9a3412; stroke-width: 1.5; stroke-dasharray: 6 4; rx: 8; }
    .arrow { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 1.7; fill: none; stroke-dasharray: 7 5; marker-end: url(#dash-arrow); }
  </style>

  <rect class="bg" width="1100" height="640"/>
  <text class="title" x="40" y="44">JetsonFabric Component View</text>

  <rect class="box" x="50" y="120" width="190" height="70"/>
  <text class="label" x="84" y="150">OpenAI client</text>
  <text class="small" x="75" y="172">chat/completions</text>

  <rect class="box" x="330" y="108" width="220" height="94"/>
  <text class="label" x="365" y="142">jetsonfabric-control</text>
  <text class="small" x="362" y="166">cluster state, routing</text>
  <text class="small" x="378" y="185">benchmarks, API</text>

  <rect class="box" x="330" y="260" width="220" height="60"/>
  <text class="label" x="382" y="294">Model registry</text>

  <rect class="box" x="330" y="370" width="220" height="60"/>
  <text class="label" x="362" y="404">Benchmark recorder</text>

  <rect class="node" x="680" y="80" width="320" height="220"/>
  <text class="label" x="705" y="112">Jetson: dopey</text>
  <rect class="box" x="710" y="132" width="260" height="48"/>
  <text class="small" x="772" y="162">jetsonfabric-agent</text>
  <rect class="box" x="710" y="196" width="260" height="48"/>
  <text class="small" x="792" y="226">llama-server</text>
  <rect class="runtime" x="710" y="258" width="260" height="30"/>
  <text class="tiny" x="758" y="278">future jetsonfabric-runtime</text>

  <rect class="node" x="680" y="360" width="320" height="160"/>
  <text class="label" x="705" y="392">Jetson: grumpy</text>
  <rect class="box" x="710" y="412" width="260" height="48"/>
  <text class="small" x="772" y="442">jetsonfabric-agent</text>
  <rect class="runtime" x="710" y="474" width="260" height="30"/>
  <text class="tiny" x="758" y="494">future jetsonfabric-runtime</text>

  <path class="arrow" d="M240 155 H330"/>
  <text class="tiny" x="258" y="145">POST /v1/chat/completions</text>

  <path class="arrow" d="M550 155 H710"/>
  <text class="tiny" x="580" y="145">P0 route</text>

  <path class="arrow" d="M840 180 V196"/>
  <text class="tiny" x="856" y="190">local proxy</text>

  <path class="arrow" d="M438 202 V260"/>
  <path class="arrow" d="M438 202 V370"/>

  <path class="arrow" d="M710 136 C605 120 592 95 550 122"/>
  <text class="tiny" x="574" y="104">heartbeat node_name=dopey</text>

  <path class="arrow" d="M710 416 C598 392 590 220 550 170"/>
  <text class="tiny" x="562" y="344">heartbeat node_name=grumpy</text>

  <path class="dash" d="M550 190 C604 242 646 260 710 272"/>
  <path class="dash" d="M550 205 C616 350 654 470 710 489"/>
  <text class="tiny" x="584" y="252">P1 plan/observe</text>

  <path class="dash" d="M970 273 C1035 330 1035 430 970 489"/>
  <text class="tiny" x="1004" y="380">activation tensors</text>
</svg>
