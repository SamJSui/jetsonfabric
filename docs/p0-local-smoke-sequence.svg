<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="780" viewBox="0 0 1360 780" role="img" aria-labelledby="title desc">
  <title id="title">JetsonFabric P0 agent-proxied local smoke sequence</title>
  <desc id="desc">A sequence diagram showing the agent loading model artifact metadata, advertising its proxy URL to the control plane, control routing chat requests to the agent, the agent forwarding to llama-server, llama-server running Qwen GGUF, and control returning route metadata with a benchmark record.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1f2937" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .lane-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .lane-subtitle { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .lifeline { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 7; }
      .step { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 7; }
      .step-strong { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; rx: 7; }
      .step-good { fill: #ecfdf5; stroke: #059669; stroke-width: 1.7; rx: 7; }
      .note { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.4; rx: 7; }
      .text { font: 400 13px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .code { font: 400 12px Consolas, 'Courier New', monospace; fill: #111827; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2563eb; stroke-width: 2.3; fill: none; marker-end: url(#arrow-blue); }
      .arrow-dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1360" height="780" />
  <text class="title" x="56" y="54">JetsonFabric P0 Agent-Proxied Local Smoke Sequence</text>
  <text class="subtitle" x="56" y="80">Control routes to the agent. The agent owns node-local runtime details and forwards to llama-server.</text>

  <rect class="lane" x="50" y="118" width="148" height="74" />
  <text class="lane-title" x="78" y="151">Client</text>
  <text class="lane-subtitle" x="78" y="173">curl / app</text>

  <rect class="lane" x="245" y="118" width="168" height="74" />
  <text class="lane-title" x="274" y="151">Control</text>
  <text class="lane-subtitle" x="274" y="173">:52415 gateway</text>

  <rect class="lane" x="460" y="118" width="168" height="74" />
  <text class="lane-title" x="488" y="151">Route State</text>
  <text class="lane-subtitle" x="488" y="173">nodes + models</text>

  <rect class="lane" x="675" y="118" width="170" height="74" />
  <text class="lane-title" x="702" y="151">Agent Proxy</text>
  <text class="lane-subtitle" x="702" y="173">:52416 node API</text>

  <rect class="lane" x="892" y="118" width="174" height="74" />
  <text class="lane-title" x="920" y="151">llama-server</text>
  <text class="lane-subtitle" x="920" y="173">:8080 runtime</text>

  <rect class="lane" x="1114" y="118" width="196" height="74" />
  <text class="lane-title" x="1142" y="151">Qwen GGUF</text>
  <text class="lane-subtitle" x="1142" y="173">local model file</text>

  <line class="lifeline" x1="124" y1="198" x2="124" y2="700" />
  <line class="lifeline" x1="329" y1="198" x2="329" y2="700" />
  <line class="lifeline" x1="544" y1="198" x2="544" y2="700" />
  <line class="lifeline" x1="760" y1="198" x2="760" y2="700" />
  <line class="lifeline" x1="979" y1="198" x2="979" y2="700" />
  <line class="lifeline" x1="1212" y1="198" x2="1212" y2="700" />

  <rect class="note" x="666" y="220" width="438" height="58" />
  <text class="small" x="686" y="243">Agent startup</text>
  <text class="code" x="686" y="262">loads configs/model-artifacts.example.json</text>
  <text class="code" x="686" y="276">knows source_url + local_path for advertised model IDs</text>

  <path class="arrow-dash" d="M760 314 L544 314" />
  <text class="small" x="598" y="305">heartbeat advertises</text>
  <text class="code" x="574" y="331">agent URL + model IDs</text>

  <rect class="step-strong" x="66" y="362" width="118" height="48" />
  <text class="small" x="86" y="383">POST chat</text>
  <text class="code" x="86" y="400">/v1/chat/...</text>
  <path class="arrow-blue" d="M184 386 L245 386" />

  <rect class="step" x="256" y="362" width="146" height="48" />
  <text class="small" x="276" y="383">Validate request</text>
  <text class="code" x="276" y="400">model + messages</text>

  <path class="arrow" d="M402 448 L460 448" />
  <rect class="step" x="470" y="425" width="148" height="48" />
  <text class="small" x="490" y="446">Select route</text>
  <text class="code" x="490" y="463">desktop-qwen</text>
  <path class="arrow" d="M460 492 L402 492" />
  <text class="small" x="414" y="437">lookup</text>
  <text class="small" x="402" y="512">agent proxy URL</text>

  <path class="arrow-blue" d="M402 548 L675 548" />
  <rect class="step-strong" x="686" y="525" width="148" height="48" />
  <text class="small" x="706" y="546">Proxy request</text>
  <text class="code" x="706" y="563">agent endpoint</text>

  <path class="arrow-blue" d="M834 584 L892 584" />
  <rect class="step-strong" x="902" y="561" width="154" height="48" />
  <text class="small" x="922" y="582">Forward locally</text>
  <text class="code" x="922" y="599">llama URL</text>

  <path class="arrow" d="M1056 626 L1114 626" />
  <rect class="step" x="1124" y="603" width="176" height="48" />
  <text class="small" x="1144" y="624">Run inference</text>
  <text class="code" x="1144" y="641">Q4_K_M weights</text>

  <path class="arrow" d="M1114 676 L1056 676" />
  <path class="arrow" d="M892 686 L834 686" />
  <path class="arrow" d="M675 696 L402 696" />
  <text class="small" x="910" y="670">assistant text + usage</text>
  <text class="small" x="505" y="688">agent returns backend response</text>

  <rect class="step-good" x="246" y="623" width="166" height="50" />
  <text class="small" x="266" y="644">Attach route metadata</text>
  <text class="code" x="266" y="662">node, backend, latency</text>

  <rect class="step-good" x="458" y="625" width="172" height="50" />
  <text class="small" x="478" y="646">Record benchmark</text>
  <text class="code" x="478" y="664">data/benchmarks.jsonl</text>

  <path class="arrow-blue" d="M246 724 L184 724" />
  <rect class="step-strong" x="56" y="701" width="128" height="48" />
  <text class="small" x="76" y="722">Return JSON</text>
  <text class="code" x="76" y="739">choices + route</text>
</svg>
