name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI_LLAMA_CPP_COMMIT: bf2c86ddc0685f580595954056c2e77ebabfab4f
  CI_LLAMA_CPP_DIR: runtime/third_party/llama.cpp
  CI_RUNTIME_BUILD_DIR: runtime/build-ci-cpu
  CI_MODEL_PATH: ${{ github.workspace }}/.cache/models/stories15M-q4_0.gguf
  CI_MODEL_URL: https://huggingface.co/ggml-org/models/resolve/499bc8821c6b12b4e53c5bffcb21ec206f212d81/tinyllamas/stories15M-q4_0.gguf
  CI_MODEL_SHA256: 66967fbece6dbe97886593fdbb73589584927e29119ec31f08090732d1861739
  CI_MODEL_EXPECTED_TOKENS: '[29892,727,471,263]'
  CI_MODEL_B_PATH: ${{ github.workspace }}/.cache/models/stories15M-q8_0.gguf
  CI_MODEL_B_URL: https://huggingface.co/ggml-org/tiny-llamas/resolve/99dd1a73db5a37100bd4ae633f4cfce6560e1567/stories15M-q8_0.gguf
  CI_MODEL_B_SHA256: 2eda49203f2f044f3dddf29a7dd7cc861ef5a0340f518a19613d73ba6d9c06b6
  CI_MODEL_B_EXPECTED_TOKENS: '[29892,727,471,263]'
  CI_QWEN_MODEL_PATH: ${{ github.workspace }}/.cache/models/qwen2.5-0.5b-instruct-q4_k_m.gguf
  CI_QWEN_MODEL_URL: https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/9217f5db79a29953eb74d5343926648285ec7e67/qwen2.5-0.5b-instruct-q4_k_m.gguf
  CI_QWEN_MODEL_SHA256: 74a4da8c9fdbcd15bd1f6d01d621410d31c6fc00986f5eb687824e7b93d7a9db

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Cross-compile Linux ARM64 node
        run: make node-linux-arm64

      - name: Validate shell syntax
        shell: bash
        run: |
          find scripts -type f -name '*.sh' -print0 \
            | xargs -0 -r -n1 bash -n

      - name: Test distributed CUDA acceptance contract
        run: bash scripts/ci/test-distributed-cuda-harness.sh

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build jq

      - name: Cache CI model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CI_MODEL_PATH }}
          key: ci-model-${{ runner.os }}-${{ env.CI_MODEL_SHA256 }}

      - name: Download CI model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$(dirname "$CI_MODEL_PATH")"
          curl -fL --retry 3 --retry-delay 2 "$CI_MODEL_URL" -o "$CI_MODEL_PATH"

      - name: Verify CI model
        run: |
          test -s "$CI_MODEL_PATH"
          test "$(head -c 4 "$CI_MODEL_PATH")" = "GGUF"
          printf '%s  %s\n' "$CI_MODEL_SHA256" "$CI_MODEL_PATH" | sha256sum -c -
          ls -lh "$CI_MODEL_PATH"

      - name: Cache second CI model
        id: model-b-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CI_MODEL_B_PATH }}
          key: ci-model-${{ runner.os }}-${{ env.CI_MODEL_B_SHA256 }}

      - name: Download second CI model
        if: steps.model-b-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$(dirname "$CI_MODEL_B_PATH")"
          curl -fL --retry 3 --retry-delay 2 "$CI_MODEL_B_URL" -o "$CI_MODEL_B_PATH"

      - name: Verify second CI model
        run: |
          test -s "$CI_MODEL_B_PATH"
          test "$(head -c 4 "$CI_MODEL_B_PATH")" = "GGUF"
          printf '%s  %s\n' "$CI_MODEL_B_SHA256" "$CI_MODEL_B_PATH" | sha256sum -c -
          ls -lh "$CI_MODEL_B_PATH"

      - name: Cache Qwen2 CI model
        id: qwen-model-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CI_QWEN_MODEL_PATH }}
          key: ci-model-${{ runner.os }}-${{ env.CI_QWEN_MODEL_SHA256 }}

      - name: Download Qwen2 CI model
        if: steps.qwen-model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$(dirname "$CI_QWEN_MODEL_PATH")"
          curl -fL --retry 3 --retry-delay 2 "$CI_QWEN_MODEL_URL" -o "$CI_QWEN_MODEL_PATH"

      - name: Verify Qwen2 CI model
        run: |
          test -s "$CI_QWEN_MODEL_PATH"
          test "$(head -c 4 "$CI_QWEN_MODEL_PATH")" = "GGUF"
          printf '%s  %s\n' "$CI_QWEN_MODEL_SHA256" "$CI_QWEN_MODEL_PATH" | sha256sum -c -
          ls -lh "$CI_QWEN_MODEL_PATH"

      - name: Cache llama.cpp checkout and CPU build
        uses: actions/cache@v4
        with:
          path: |
            runtime/third_party/llama.cpp
            runtime/build-ci-cpu
          key: ci-runtime-${{ runner.os }}-${{ env.CI_LLAMA_CPP_COMMIT }}-${{ hashFiles('Makefile', 'runtime/CMakeLists.txt', 'runtime/**/*.cpp', 'runtime/**/*.h', 'runtime/**/*.hpp', 'runtime/patches/**', 'scripts/ci/smoke-binary-activation.sh', 'scripts/local/validate-single-node.sh', 'scripts/local/validate-colocated-pipeline.sh', 'scripts/local/validate-runtime-lifecycle.sh') }}

      - name: Run one-node real CPU E2E
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .ci-logs/single-runtime
          make test-integration-single \
            MODEL=ci-tiny-llama \
            MODEL_PATH="$CI_MODEL_PATH" \
            LLAMA_CPP_COMMIT="$CI_LLAMA_CPP_COMMIT" \
            INTEGRATION_BUILD_DIR="$CI_RUNTIME_BUILD_DIR" \
            INTEGRATION_RUNTIME_BIN=dist/jetsonfabric-runtime-worker-ci-cpu \
            RUNTIME_BUILD_JOBS=2 \
            JF_NODE0_PORT=18180 \
            JF_EXPECTED_TOKENS="$CI_MODEL_EXPECTED_TOKENS" \
            2>&1 | tee .ci-logs/single-runtime/step.log

      - name: Run runtime lifecycle real CPU E2E
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .ci-logs/runtime-lifecycle
          MODEL_PATH="$CI_MODEL_PATH" \
          MODEL_ID=ci-tiny-llama \
          LLAMA_CPP_COMMIT="$CI_LLAMA_CPP_COMMIT" \
          RUNTIME_BUILD_DIR="$CI_RUNTIME_BUILD_DIR" \
          RUNTIME_BIN=dist/jetsonfabric-runtime-worker-ci-cpu \
          NODE_BIN=dist/jetsonfabric-node \
          JF_SKIP_BUILD=true \
          JF_NODE0_PORT=18280 \
          JF_RUNTIME0_PORT=18290 \
          JF_EXPECTED_TOKENS="$CI_MODEL_EXPECTED_TOKENS" \
          bash scripts/local/validate-runtime-lifecycle.sh \
            2>&1 | tee .ci-logs/runtime-lifecycle/step.log

      - name: Run coordinator model switch real CPU E2E
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .ci-logs/coordinator-model-switch
          MODEL_A_PATH="$CI_MODEL_PATH" \
          MODEL_B_PATH="$CI_MODEL_B_PATH" \
          LLAMA_CPP_COMMIT="$CI_LLAMA_CPP_COMMIT" \
          RUNTIME_BUILD_DIR="$CI_RUNTIME_BUILD_DIR" \
          RUNTIME_BIN=dist/jetsonfabric-runtime-worker-ci-cpu \
          NODE_BIN=dist/jetsonfabric-node \
          JF_SKIP_BUILD=true \
          JF_NODE0_PORT=18380 \
          JF_NODE1_PORT=18381 \
          JF_RUNTIME0_PORT=18390 \
          JF_RUNTIME1_PORT=18391 \
          JF_EXPECTED_TOKENS_A="$CI_MODEL_EXPECTED_TOKENS" \
          JF_EXPECTED_TOKENS_B="$CI_MODEL_B_EXPECTED_TOKENS" \
          bash scripts/local/validate-coordinator-model-switch.sh \
            2>&1 | tee .ci-logs/coordinator-model-switch/step.log

      - name: Run two-node real CPU E2E
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .ci-logs/real-runtime
          make test-integration-pipeline \
            MODEL=ci-tiny-llama \
            MODEL_PATH="$CI_MODEL_PATH" \
            LLAMA_CPP_COMMIT="$CI_LLAMA_CPP_COMMIT" \
            INTEGRATION_BUILD_DIR="$CI_RUNTIME_BUILD_DIR" \
            INTEGRATION_RUNTIME_BIN=dist/jetsonfabric-runtime-worker-ci-cpu \
            RUNTIME_BUILD_JOBS=2 \
            JF_NODE0_PORT=18180 \
            JF_NODE1_PORT=18181 \
            JF_RUNTIME0_PORT=18190 \
            JF_RUNTIME1_PORT=18191 \
            JF_EXPECTED_TOKENS="$CI_MODEL_EXPECTED_TOKENS" \
            JF_REPORT_PATH=.ci-logs/real-runtime/report.json \
            2>&1 | tee .ci-logs/real-runtime/step.log

      - name: Run native runtime unit tests
        run: ctest --test-dir "$CI_RUNTIME_BUILD_DIR" --output-on-failure

      - name: Run Qwen2 partition residency equivalence
        run: CI_MODEL_PATH="$CI_QWEN_MODEL_PATH" "$CI_RUNTIME_BUILD_DIR/jetsonfabric-llama-stage-test"

      - name: Run two-node binary activation E2E
        run: bash scripts/ci/smoke-binary-activation.sh

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_id }}
          path: .ci-logs
          if-no-files-found: warn
          retention-days: 7
